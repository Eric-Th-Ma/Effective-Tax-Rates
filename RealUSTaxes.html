    <head>

    <body>
        <!--[if lt IE 7]>

        <![endif]-->
        <div style="margin: 20px; background-color: rgba(211, 211, 211, 0.95); padding: 8px;">
            <h1 style="margin: 0px;">How income taxes have really changed</h1>
            <div style="padding: 8px;">
                <p>
                To learn about how taxes have changed since 1977 enter an income below too see a graph of the effective
                tax rate on that income level. To compare multiple income levels just add more.
                </p>
                <form id="incomeReader" name="incomeReader" action="" method="POST" enctype="application/x-www-form-urlencoded" style="display: inline;">
                    <strong>Income in thousands of 2019 dollars: </strong><input type="number" name="income" id="income"> ,000
                </form>
                <button id="Add To Plot" onclick="updateIncomeTaxInfo()">Add</button>
                <br>
            </div>

            <canvas id = "incomeTaxGraph" width = "600" height = "250"> </canvas>

            <br>
            <button id="clear" onclick="clearPlot()">Clear</button> 
            <div id="presidency overlay" onmouseover="overlayPlot(presidencyControl)" onmouseout="removeOverlay()" style="margin: 20px; background-color: red; padding: 8px; display: inline-block;"><h3 style="margin: 0px;">Presidency</h3></div>
            <div id="congress overlay" onmouseover="overlayPlot(congressControl)" onmouseout="removeOverlay()" style="margin: 20px; background-color:blue; padding: 8px; display: inline-block;"><h3 style="margin: 0px;">Congress</h3></div>
        </div>

    </body>
